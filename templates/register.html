<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Smart Attendance System</h1>
    <p>Welcome to Laguna University</p>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register" id="registerForm">
        <select name="user_type" required>
            <option value="">Please Select</option>
            <option value="student" {% if user_type == 'student' %}selected{% endif %}>Student</option>
            <option value="teacher" {% if user_type == 'teacher' %}selected{% endif %}>Teacher</option>
        </select>

        <div class="info-box">
            <label>Full Name:</label>
            <input type="text" name="fullname" placeholder="Lastname, Firstname" value="{{ fullname or '' }}" required>

            <label>Email:</label>
            <input type="email" name="email" placeholder="Email" value="{{ email or '' }}" required>

            <label>Password:</label>
            <input type="password" name="password" placeholder="Password" required>

            <label>Confirm Password:</label>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Register</button> 
            
            
        </div>
    </form>

    <div class="register">
        <p>Already have an account? <a href="{{ url_for('teacherlogin') }}">Login</a></p>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
        <div class="loading-spinner"></div>
        <p class="loading-text">Creating account...</p>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    // Show loading overlay
    document.getElementById('loadingOverlay').classList.add('show');
    
    // Disable the submit button to prevent multiple submissions
    const submitBtn = this.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account...';
});
</script>

</body>
</html>
